name: Build llama.cpp-tq3 (Windows CUDA)

on:
  workflow_dispatch:
    inputs:
      cuda_version:
        description: 'CUDA Toolkit version (CUDA 12.x only)'
        required: true
        default: '12.8.1'
        type: choice
        options:
          - '12.8.1'
      build_type:
        description: 'Build type'
        required: true
        default: 'Release'
        type: choice
        options:
          - 'Release'
          - 'RelWithDebInfo'
      cuda_arch:
        description: 'CUDA architectures semicolon-separated'
        required: true
        default: '52;61;75;80;86;89;90'
        type: string
      build_server:
        description: 'Build llama-server'
        required: true
        default: true
        type: boolean
      build_tools:
        description: 'Build CLI tools (llama-cli, llama-bench, quantize, etc.)'
        required: true
        default: true
        type: boolean
      build_examples:
        description: 'Build examples'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}
  cancel-in-progress: true

env:
  UPSTREAM_REPO: turbo-tan/llama.cpp-tq3
  UPSTREAM_BRANCH: main

jobs:
  build-windows-cuda:
    runs-on: windows-2022
    strategy:
      fail-fast: false

    steps:
      - name: Checkout upstream
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ env.UPSTREAM_BRANCH }}
          submodules: recursive
          fetch-depth: 1

      - name: Setup CUDA Toolkit (direct download + 7z extract)
        shell: pwsh
        run: |
          $cudaVersion = "${{ inputs.cuda_version }}"

          # ---------------------------------------------------------------
          # 1. Ensure 7-Zip is available
          # ---------------------------------------------------------------
          $7zPath = (Get-Command 7z.exe -ErrorAction SilentlyContinue).Source
          if (-not $7zPath) { $7zPath = "C:\Program Files\7-Zip\7z.exe" }
          if (-not (Test-Path $7zPath)) { $7zPath = "${env:ProgramFiles}\7-Zip\7z.exe" }
          if (-not (Test-Path $7zPath)) {
            Write-Host "7-Zip not found. Installing via Chocolatey..."
            choco install 7zip -y --no-progress --limit-output 2>&1
            $7zPath = "C:\Program Files\7-Zip\7z.exe"
          }
          Write-Host "Using 7-Zip: $7zPath"

          # ---------------------------------------------------------------
          # 2. Download CUDA local installer from NVIDIA
          # ---------------------------------------------------------------
          $nvidiaUrl = "https://developer.download.nvidia.com/compute/cuda/$cudaVersion/local_installers/cuda_${cudaVersion}_windows.exe"
          $installerPath = "$env:TEMP\cuda_installer.exe"
          $extractDir = "C:\CUDA-$cudaVersion"

          Write-Host "==> Downloading CUDA Toolkit $cudaVersion from NVIDIA..."
          Write-Host "URL: $nvidiaUrl"

          # Download with retries and longer timeout
          $maxRetries = 3
          for ($retry = 1; $retry -le $maxRetries; $retry++) {
            try {
              Invoke-WebRequest -Uri $nvidiaUrl -OutFile $installerPath -UseBasicParsing -TimeoutSec 900
              Write-Host "Download complete ($((Get-Item $installerPath).Length / 1MB) MB)"
              break
            } catch {
              if ($retry -eq $maxRetries) { throw }
              Write-Warning "Download attempt $retry failed: $_ . Retrying..."
              Start-Sleep -Seconds 10
            }
          }

          # ---------------------------------------------------------------
          # 3. Extract with 7-Zip (the .exe is a self-extracting 7z archive)
          # ---------------------------------------------------------------
          Write-Host "==> Extracting CUDA toolkit with 7-Zip..."
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          & $7zPath x $installerPath -o"$extractDir" -y -aoa 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "7-Zip extraction failed (exit $LASTEXITCODE). Trying installer -extract..."
            & $installerPath -extract="$extractDir" 2>&1
          }

          # ---------------------------------------------------------------
          # 4. Find nvcc.exe in extracted files (handles nested layouts)
          # ---------------------------------------------------------------
          Write-Host "==> Locating nvcc.exe..."
          $cudaDir = $null

          # Search patterns for common CUDA extraction layouts
          $searchPaths = @(
            $extractDir,
            (Join-Path $extractDir "cuda"),
            (Join-Path $extractDir "CUDA"),
            (Join-Path $extractDir "CUDA-$cudaVersion"),
            "$env:ProgramFiles\NVIDIA GPU Computing Toolkit\CUDA"
          )

          foreach ($base in $searchPaths) {
            if (-not (Test-Path $base)) { continue }
            $candidates = if (Test-Path "$base\bin\nvcc.exe") { @(Get-Item $base) }
                          else { Get-ChildItem $base -Directory -ErrorAction SilentlyContinue | Where-Object { Test-Path "$($_.FullName)\bin\nvcc.exe" } }
            foreach ($c in $candidates) {
              $cudaDir = $c.FullName
              Write-Host "  Found: $cudaDir"
              break
            }
            if ($cudaDir) { break }
          }

          # Last resort: deep filesystem search
          if (-not $cudaDir) {
            Write-Host "Searching deeper for nvcc.exe..."
            $nvccPaths = Get-ChildItem $extractDir -Filter "nvcc.exe" -Recurse -ErrorAction SilentlyContinue -Depth 6 | Select-Object -First 1
            if ($nvccPaths) {
              $cudaDir = $nvccPaths.Directory.Parent.FullName
              Write-Host "  Found (deep search): $cudaDir"
            }
          }

          if (-not $cudaDir -or -not (Test-Path "$cudaDir\bin\nvcc.exe")) {
            Write-Host "=== Extraction directory contents ==="
            Get-ChildItem $extractDir -Depth 2 | Select-Object FullName, Mode | Format-Table -AutoSize | Out-String | Write-Host
            Write-Error "nvcc.exe not found after extraction!"
            exit 1
          }

          # ---------------------------------------------------------------
          # 5. Set up CUDA environment
          # ---------------------------------------------------------------
          $cudaBin = Join-Path $cudaDir "bin"
          echo "CUDA_PATH=$cudaDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          echo "CUDA_HOME=$cudaDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          echo "$cudaBin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          $env:Path += ";$cudaBin"

          # Add nvvm if present
          $nvvmPath = Join-Path $cudaDir "nvvm\bin"
          if (Test-Path $nvvmPath) {
            echo "$nvvmPath" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
            $env:Path += ";$nvvmPath"
          }

          # Add lib path for cmake find_package(CUDA)
          $cudaLib = Join-Path $cudaDir "lib\x64"
          Write-Host "CUDA_PATH=$cudaDir"
          Write-Host "CUDA lib: $cudaLib"

          # ---------------------------------------------------------------
          # 6. Verify nvcc
          # ---------------------------------------------------------------
          $nvccCmd = (Get-Command nvcc.exe -ErrorAction SilentlyContinue)
          if (-not $nvccCmd) { $nvccCmd = Get-Item "$cudaBin\nvcc.exe" -ErrorAction SilentlyContinue }
          if ($nvccCmd) {
            Write-Host "nvcc verified: $($nvccCmd.Source)"
            & $nvccCmd.Source --version
          } else {
            Write-Error "nvcc.exe not found in PATH!"
            exit 1
          }

      - name: Setup Visual Studio shell (amd64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} `
            -DGGML_CUDA=ON `
            -DGGML_NATIVE=ON `
            -DGGML_CUDA_GRAPHS=ON `
            -DGGML_CUDA_FA=ON `
            -DGGML_CUDA_FA_ALL_QUANTS=ON `
            -DCMAKE_CUDA_ARCHITECTURES="${{ inputs.cuda_arch }}" `
            -DLLAMA_BUILD_TESTS=OFF `
            -DLLAMA_BUILD_EXAMPLES=${{ inputs.build_examples && 'ON' || 'OFF' }} `
            -DLLAMA_BUILD_SERVER=${{ inputs.build_server && 'ON' || 'OFF' }} `
            -DLLAMA_BUILD_TOOLS=${{ inputs.build_tools && 'ON' || 'OFF' }} `
            -DLLAMA_BUILD_COMMON=ON `
            -DLLAMA_FATAL_WARNINGS=OFF `
            -DCMAKE_CUDA_HOST_COMPILER=cl `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL `
            -DCMAKE_INSTALL_PREFIX="${{ runner.temp }}/install"

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config ${{ inputs.build_type }} --parallel

      - name: Install binaries
        shell: pwsh
        run: |
          cmake --install build --config ${{ inputs.build_type }} --prefix "${{ runner.temp }}/install"

      - name: Collect binaries
        shell: pwsh
        run: |
          $installDir = "${{ runner.temp }}/install"
          $distDir = "${{ runner.temp }}/dist"
          New-Item -ItemType Directory -Force -Path $distDir | Out-Null

          # Copy all binaries from install directory
          Get-ChildItem -Path "$installDir/bin" -Filter "*.exe" -Recurse | ForEach-Object {
            Write-Host "Copying: $($_.FullName)"
            Copy-Item $_.FullName -Destination "$distDir/" -Force
          }
          Get-ChildItem -Path "$installDir/bin" -Filter "*.dll" -Recurse | ForEach-Object {
            Write-Host "Copying: $($_.FullName)"
            Copy-Item $_.FullName -Destination "$distDir/" -Force
          }
          Get-ChildItem -Path "$installDir/bin" -Filter "*.lib" -Recurse | ForEach-Object {
            Write-Host "Copying: $($_.FullName)"
            Copy-Item $_.FullName -Destination "$distDir/" -Force
          }
          Get-ChildItem -Path "$installDir/bin" -Filter "*.pdb" -Recurse | ForEach-Object {
            Write-Host "Copying: $($_.FullName)"
            Copy-Item $_.FullName -Destination "$distDir/" -Force
          }

          # Also look in build/bin for anything not installed
          Get-ChildItem -Path "build/bin" -Filter "*.exe" | ForEach-Object {
            $destFile = Join-Path $distDir $_.Name
            if (-not (Test-Path $destFile)) {
              Write-Host "Copying (from build/bin): $($_.FullName)"
              Copy-Item $_.FullName -Destination $destFile -Force
            }
          }
          Get-ChildItem -Path "build/bin" -Filter "*.dll" | ForEach-Object {
            $destFile = Join-Path $distDir $_.Name
            if (-not (Test-Path $destFile)) {
              Write-Host "Copying (from build/bin): $($_.FullName)"
              Copy-Item $_.FullName -Destination $destFile -Force
            }
          }

          # Copy CUDA dependencies (cudart, cublas, etc.)
          $cudaPath = "${{ env.CUDA_PATH }}"
          if (Test-Path "$cudaPath/bin") {
            Get-ChildItem -Path "$cudaPath/bin" -Filter "cudart*.dll" | ForEach-Object {
              Copy-Item $_.FullName -Destination "$distDir/" -Force
            }
            Get-ChildItem -Path "$cudaPath/bin" -Filter "cublas*.dll" | ForEach-Object {
              Copy-Item $_.FullName -Destination "$distDir/" -Force
            }
            Get-ChildItem -Path "$cudaPath/bin" -Filter "cufft*.dll" | ForEach-Object {
              Copy-Item $_.FullName -Destination "$distDir/" -Force
            }
            Get-ChildItem -Path "$cudaPath/bin" -Filter "curand*.dll" | ForEach-Object {
              Copy-Item $_.FullName -Destination "$distDir/" -Force
            }
            Get-ChildItem -Path "$cudaPath/bin" -Filter "cusparse*.dll" | ForEach-Object {
              Copy-Item $_.FullName -Destination "$distDir/" -Force
            }
            Get-ChildItem -Path "$cudaPath/bin" -Filter "cusolver*.dll" | ForEach-Object {
              Copy-Item $_.FullName -Destination "$distDir/" -Force
            }
            Get-ChildItem -Path "$cudaPath/bin" -Filter "nvrtc*.dll" | ForEach-Object {
              Copy-Item $_.FullName -Destination "$distDir/" -Force
            }
          }

          # Copy MSVC runtime DLLs
          Get-ChildItem -Path "$distDir/" -Filter "*.dll" | ForEach-Object {
            Write-Host "Included DLL: $($_.Name)"
          }
          Get-ChildItem -Path "$distDir/" -Filter "*.exe" | ForEach-Object {
            Write-Host "Included EXE: $($_.Name)"
          }

      - name: Create archive
        shell: pwsh
        run: |
          $distDir = "${{ runner.temp }}/dist"
          $archiveName = "llama.cpp-tq3-windows-x64-cuda${{ inputs.cuda_version }}-${{ inputs.build_type }}.zip"
          Compress-Archive -Path "$distDir/*" -DestinationPath "${{ runner.temp }}/$archiveName" -CompressionLevel Optimal
          echo "ARCHIVE_NAME=$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama.cpp-tq3-windows-x64-cuda${{ inputs.cuda_version }}-${{ inputs.build_type }}
          path: ${{ runner.temp }}/dist/
          compression-level: 0
          retention-days: 7

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ runner.temp }}/${{ env.ARCHIVE_NAME }}
          compression-level: 0
          retention-days: 7
