name: Build llama.cpp-tq3 (Windows CUDA)

on:
  workflow_dispatch:
    inputs:
      cuda_version:
        description: 'CUDA Toolkit version (CUDA 12.x only)'
        required: true
        default: '12.8.1'
        type: choice
        options:
          - '12.8.1'
      build_type:
        description: 'Build type'
        required: true
        default: 'Release'
        type: choice
        options:
          - 'Release'
          - 'RelWithDebInfo'
      cuda_arch:
        description: 'CUDA architectures semicolon-separated'
        required: true
        default: '52;61;75;80;86;89;90'
        type: string
      build_server:
        description: 'Build llama-server'
        required: true
        default: true
        type: boolean
      build_tools:
        description: 'Build CLI tools (llama-cli, llama-bench, quantize, etc.)'
        required: true
        default: true
        type: boolean
      build_examples:
        description: 'Build examples'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}
  cancel-in-progress: true

env:
  UPSTREAM_REPO: turbo-tan/llama.cpp-tq3
  UPSTREAM_BRANCH: main

jobs:
  build-windows-cuda:
    runs-on: windows-2022
    strategy:
      fail-fast: false

    steps:
      - name: Checkout upstream
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ env.UPSTREAM_BRANCH }}
          submodules: recursive
          fetch-depth: 1

      - name: Setup CUDA Toolkit (network installer, silent mode)
        shell: pwsh
        run: |
          $cudaVersion = "${{ inputs.cuda_version }}"
          $cudaShort = $cudaVersion.Substring(0, $cudaVersion.LastIndexOf('.'))  # e.g. "12.8"
          $cudaUrl = "https://developer.download.nvidia.com/compute/cuda/$cudaVersion/network_installers/cuda_${cudaVersion}_windows_network.exe"
          $installerPath = "$env:TEMP\cuda_installer.exe"

          Write-Host "==> Downloading CUDA Toolkit $cudaVersion network installer..."
          Write-Host "URL: $cudaUrl"

          $maxRetries = 3
          for ($retry = 1; $retry -le $maxRetries; $retry++) {
            try {
              Invoke-WebRequest -Uri $cudaUrl -OutFile $installerPath -UseBasicParsing -TimeoutSec 900
              $sizeMB = [math]::Round((Get-Item $installerPath).Length / 1MB, 2)
              Write-Host "Download complete ($sizeMB MB)"
              break
            } catch {
              if ($retry -eq $maxRetries) { throw }
              Write-Warning "Attempt $retry failed: $_ . Retrying..."
              Start-Sleep -Seconds 10
            }
          }

          Write-Host "==> Installing selected sub-packages: nvcc, cudart, cublas (silent install)..."
          $packages = "nvcc_$cudaShort cudart_$cudaShort cudart_dev_$cudaShort cublas_$cudaShort cublas_dev_$cudaShort"
          Write-Host "Packages: $packages"

          $proc = Start-Process -FilePath $installerPath `
            -ArgumentList "-s $packages" `
            -Wait -NoNewWindow -PassThru
          if ($proc.ExitCode -ne 0) {
            Write-Error "CUDA installer exited with code $($proc.ExitCode)"
            # Collect log files for debugging
            $logFiles = Get-ChildItem "$env:TEMP" -Filter "*cuda*install*" -ErrorAction SilentlyContinue
            if ($logFiles) { $logFiles | ForEach-Object { Write-Host "Log: $($_.FullName)" } }
            # Also check in the NVIDIA log directory
            $nvidiaLogs = Get-ChildItem "${env:SystemRoot}\Temp" -Filter "*.log" -ErrorAction SilentlyContinue | Where-Object { $_.Name -match "cuda|nvidia" }
            if ($nvidiaLogs) { $nvidiaLogs | ForEach-Object { Write-Host "NVIDIA Log: $($_.FullName)" } }
            exit $proc.ExitCode
          }

          # ---------------------------------------------------------------
          # CUDA default install location on Windows
          # ---------------------------------------------------------------
          $cudaDir = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v$cudaShort"
          if (-not (Test-Path $cudaDir)) {
            Write-Host "Default path not found, searching for CUDA installation..."
            $cudaDirs = Get-ChildItem "${env:ProgramFiles}\NVIDIA GPU Computing Toolkit\CUDA" -Directory -ErrorAction SilentlyContinue
            if (-not $cudaDirs) { $cudaDirs = Get-ChildItem "${env:ProgramFiles(x86)}\NVIDIA GPU Computing Toolkit\CUDA" -Directory -ErrorAction SilentlyContinue }
            if ($cudaDirs) {
              $cudaDir = $cudaDirs[-1].FullName  # highest version
              Write-Host "Found: $cudaDir"
            } else {
              Write-Error "CUDA Toolkit not found after installation!"
              exit 1
            }
          }

          $cudaBin = Join-Path $cudaDir "bin"
          $cudaLib = Join-Path $cudaDir "lib\x64"

          # Set environment variables
          echo "CUDA_PATH=$cudaDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          echo "CUDA_HOME=$cudaDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          echo "CUDA_PATH_V${cudaShort//./_}=$cudaDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          echo "$cudaBin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          $env:Path += ";$cudaBin"

          # Add nvvm path if present
          $nvvmPath = Join-Path $cudaDir "nvvm\bin"
          if (Test-Path $nvvmPath) {
            echo "$nvvmPath" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          }

          Write-Host "CUDA_PATH=$cudaDir"
          Write-Host "CUDA bin: $cudaBin"
          Write-Host "CUDA lib: $cudaLib"

          # Verify nvcc
          $nvccPath = Get-Command nvcc.exe -ErrorAction SilentlyContinue
          if (-not $nvccPath) { $nvccPath = Get-Item "$cudaBin\nvcc.exe" -ErrorAction SilentlyContinue }
          if ($nvccPath) {
            Write-Host "nvcc verified: $($nvccPath.Source)"
            & $nvccPath.Source --version
          } else {
            Write-Error "nvcc.exe not found!"
            exit 1
          }

      - name: Setup Visual Studio shell (amd64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} `
            -DGGML_CUDA=ON `
            -DGGML_NATIVE=ON `
            -DGGML_CUDA_GRAPHS=ON `
            -DGGML_CUDA_FA=ON `
            -DGGML_CUDA_FA_ALL_QUANTS=ON `
            -DCMAKE_CUDA_ARCHITECTURES="${{ inputs.cuda_arch }}" `
            -DLLAMA_BUILD_TESTS=OFF `
            -DLLAMA_BUILD_EXAMPLES=${{ inputs.build_examples && 'ON' || 'OFF' }} `
            -DLLAMA_BUILD_SERVER=${{ inputs.build_server && 'ON' || 'OFF' }} `
            -DLLAMA_BUILD_TOOLS=${{ inputs.build_tools && 'ON' || 'OFF' }} `
            -DLLAMA_BUILD_COMMON=ON `
            -DLLAMA_FATAL_WARNINGS=OFF `
            -DCMAKE_CUDA_HOST_COMPILER=cl `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL `
            -DCMAKE_INSTALL_PREFIX="${{ runner.temp }}/install"

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config ${{ inputs.build_type }} --parallel

      - name: Install binaries
        shell: pwsh
        run: |
          cmake --install build --config ${{ inputs.build_type }} --prefix "${{ runner.temp }}/install"

      - name: Collect binaries
        shell: pwsh
        run: |
          $installDir = "${{ runner.temp }}/install"
          $distDir = "${{ runner.temp }}/dist"
          New-Item -ItemType Directory -Force -Path $distDir | Out-Null

          # Copy all binaries from install directory
          Get-ChildItem -Path "$installDir/bin" -Filter "*.exe" -Recurse | ForEach-Object {
            Write-Host "Copying: $($_.FullName)"
            Copy-Item $_.FullName -Destination "$distDir/" -Force
          }
          Get-ChildItem -Path "$installDir/bin" -Filter "*.dll" -Recurse | ForEach-Object {
            Write-Host "Copying: $($_.FullName)"
            Copy-Item $_.FullName -Destination "$distDir/" -Force
          }
          Get-ChildItem -Path "$installDir/bin" -Filter "*.lib" -Recurse | ForEach-Object {
            Write-Host "Copying: $($_.FullName)"
            Copy-Item $_.FullName -Destination "$distDir/" -Force
          }
          Get-ChildItem -Path "$installDir/bin" -Filter "*.pdb" -Recurse | ForEach-Object {
            Write-Host "Copying: $($_.FullName)"
            Copy-Item $_.FullName -Destination "$distDir/" -Force
          }

          # Also look in build/bin for anything not installed
          Get-ChildItem -Path "build/bin" -Filter "*.exe" | ForEach-Object {
            $destFile = Join-Path $distDir $_.Name
            if (-not (Test-Path $destFile)) {
              Write-Host "Copying (from build/bin): $($_.FullName)"
              Copy-Item $_.FullName -Destination $destFile -Force
            }
          }
          Get-ChildItem -Path "build/bin" -Filter "*.dll" | ForEach-Object {
            $destFile = Join-Path $distDir $_.Name
            if (-not (Test-Path $destFile)) {
              Write-Host "Copying (from build/bin): $($_.FullName)"
              Copy-Item $_.FullName -Destination $destFile -Force
            }
          }

          # Copy CUDA dependencies (cudart, cublas, etc.)
          $cudaPath = "${{ env.CUDA_PATH }}"
          if (Test-Path "$cudaPath/bin") {
            Get-ChildItem -Path "$cudaPath/bin" -Filter "cudart*.dll" | ForEach-Object {
              Copy-Item $_.FullName -Destination "$distDir/" -Force
            }
            Get-ChildItem -Path "$cudaPath/bin" -Filter "cublas*.dll" | ForEach-Object {
              Copy-Item $_.FullName -Destination "$distDir/" -Force
            }
            Get-ChildItem -Path "$cudaPath/bin" -Filter "cufft*.dll" | ForEach-Object {
              Copy-Item $_.FullName -Destination "$distDir/" -Force
            }
            Get-ChildItem -Path "$cudaPath/bin" -Filter "curand*.dll" | ForEach-Object {
              Copy-Item $_.FullName -Destination "$distDir/" -Force
            }
            Get-ChildItem -Path "$cudaPath/bin" -Filter "cusparse*.dll" | ForEach-Object {
              Copy-Item $_.FullName -Destination "$distDir/" -Force
            }
            Get-ChildItem -Path "$cudaPath/bin" -Filter "cusolver*.dll" | ForEach-Object {
              Copy-Item $_.FullName -Destination "$distDir/" -Force
            }
            Get-ChildItem -Path "$cudaPath/bin" -Filter "nvrtc*.dll" | ForEach-Object {
              Copy-Item $_.FullName -Destination "$distDir/" -Force
            }
          }

          # Copy MSVC runtime DLLs
          Get-ChildItem -Path "$distDir/" -Filter "*.dll" | ForEach-Object {
            Write-Host "Included DLL: $($_.Name)"
          }
          Get-ChildItem -Path "$distDir/" -Filter "*.exe" | ForEach-Object {
            Write-Host "Included EXE: $($_.Name)"
          }

      - name: Create archive
        shell: pwsh
        run: |
          $distDir = "${{ runner.temp }}/dist"
          $archiveName = "llama.cpp-tq3-windows-x64-cuda${{ inputs.cuda_version }}-${{ inputs.build_type }}.zip"
          Compress-Archive -Path "$distDir/*" -DestinationPath "${{ runner.temp }}/$archiveName" -CompressionLevel Optimal
          echo "ARCHIVE_NAME=$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama.cpp-tq3-windows-x64-cuda${{ inputs.cuda_version }}-${{ inputs.build_type }}
          path: ${{ runner.temp }}/dist/
          compression-level: 0
          retention-days: 7

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ runner.temp }}/${{ env.ARCHIVE_NAME }}
          compression-level: 0
          retention-days: 7
